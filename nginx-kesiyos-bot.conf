# =============================================================================
# Kesiyos Bot — Nginx Configuration
# Add this INSIDE your existing kesiyos.com server block
# =============================================================================

    # Meta webhook endpoint — proxies to FastAPI bot
    location /meta/ {
        proxy_pass http://127.0.0.1:8444/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Meta webhooks can be slow — give them time
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

# After adding this, test and reload:
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Your webhook URL for Meta will be:
#   https://kesiyos.com/meta/webhook
